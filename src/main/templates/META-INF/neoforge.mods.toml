modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"
issueTrackerURL="https://github.com/diegovehdz/requiem-armory/issues"

# Mixins: the wooden ranged tier is applied onto the vanilla bow (and later crossbow) here.
[[mixins]]
config="requiem_armory.mixins.json"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="${mod_authors}"
#logoFile="requiem_armory.png"
description='''${mod_description}'''

# --- Dependencies ---
[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="[${neo_version},)"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

# Optional: if Better Combat is present, load after it so we can supply weapon_attributes / movesets.
[[dependencies.${mod_id}]]
    modId="bettercombat"
    type="optional"
    versionRange="*"
    ordering="AFTER"
    side="BOTH"
